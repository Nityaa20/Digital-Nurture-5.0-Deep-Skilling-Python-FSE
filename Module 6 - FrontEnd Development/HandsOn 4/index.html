<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Portal</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

    <h1>Student Portal</h1>

</header>
